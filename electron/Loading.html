<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Loading</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1f2937;
        color: white;
        font-family: Arial, sans-serif;
      }

      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .box {
        text-align: center;
      }

      .spinner {
        width: 46px;
        height: 46px;
        border: 5px solid rgba(255, 255, 255, 0.3);
        border-top: 5px solid white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 22px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      h2 {
        margin: 0 0 8px;
        font-size: 22px;
      }

      p {
        margin: 0;
        color: #d1d5db;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="box">
      <div class="spinner"></div>
      <h2>Starting AutoShop Manager</h2>
      <p>Loading backend services...</p>
    </div>
  </body>
</html>
